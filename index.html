<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Vision Matcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #c8f061;
      --accent2: #7b61ff;
      --text: #f0ede6;
      --muted: #666;
      --sold: #ff6b6b;
      --mono: 'DM Mono', monospace;
      --serif: 'Fraunces', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    header span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    main {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: calc(100vh - 73px);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
    }

    .drop-zone {
      border: 1px dashed var(--border);
      border-radius: 4px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: #1a1f0e;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .drop-zone svg {
      color: var(--muted);
      transition: color 0.15s;
    }

    .drop-zone:hover svg {
      color: var(--accent);
    }

    .drop-zone p {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .drop-zone img#preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .drop-zone.has-image img#preview {
      display: block;
    }

    .drop-zone.has-image .placeholder {
      display: none;
    }

    .image-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
      padding: 0.75rem;
      font-size: 11px;
      color: #fff;
      display: none;
    }

    .drop-zone.has-image .image-overlay {
      display: block;
    }

    .btn {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 11px;
      color: var(--muted);
      min-height: 18px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.loading {
      background: var(--accent2);
      animation: pulse 1s infinite;
    }

    .dot.success {
      background: var(--accent);
    }

    .dot.error {
      background: var(--sold);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .content {
      padding: 2rem 2.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      color: var(--muted);
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.8;
      text-align: center;
      max-width: 280px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .stat-cell {
      background: var(--surface);
      padding: 1.25rem 1.5rem;
    }

    .stat-cell .label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }

    .stat-cell .value {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .stat-cell .value.accent {
      color: var(--accent);
    }

    .section-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: var(--surface);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody td {
      padding: 0.7rem 0.75rem;
      font-size: 12px;
      color: var(--text);
      vertical-align: middle;
    }

    .sold-tag {
      display: inline-block;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--sold);
      border: 1px solid var(--sold);
      border-radius: 2px;
      padding: 1px 5px;
    }

    .source-tag {
      display: inline-block;
      font-size: 10px;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 2px;
      padding: 2px 6px;
    }

    .sim-bar {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sim-bar-track {
      width: 50px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .sim-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .sim-bar span {
      font-size: 11px;
      color: var(--muted);
    }

    a.listing-link {
      color: var(--text);
      text-decoration: none;
      transition: color 0.1s;
    }

    a.listing-link:hover {
      color: var(--accent);
    }

    .price-val {
      font-weight: 500;
    }

    .price-val.cheapest {
      color: var(--accent);
    }

    #results {
      display: none;
    }

    #results.visible {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
  </style>
</head>

<body>

  <header>
    <h1>Product <em>Vision</em> Matcher</h1>
    <span>Price Intelligence</span>
  </header>

  <main>
    <aside class="sidebar">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp" />
        <img id="preview" alt="Preview" />
        <div class="placeholder" style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;">
          <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
          </svg>
          <p>Drop an image here<br />or click to browse<br /><span style="color:#444">JPG · PNG · WEBP</span></p>
        </div>
        <div class="image-overlay" id="imageOverlay"></div>
      </div>

      <button class="btn" id="analyzeBtn" disabled>Analyze Image</button>

      <div class="status-bar">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">No image selected</span>
      </div>
    </aside>

    <section class="content">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"
          style="color:#333">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3 21h18M3.75 3h16.5M4.5 3v18M19.5 3v18" />
        </svg>
        <p>Upload a product image to find comparable marketplace listings and pricing data.</p>
      </div>

      <div id="results">
        <div class="stats-grid" id="statsGrid"></div>

        <div>
          <div class="section-label">Listings — sorted by price</div>
          <table id="listingsTable">
            <thead>
              <tr>
                <th>Title</th>
                <th>Price</th>
                <th>Source</th>
                <th>Similarity</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="listingsBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    const API = '/analyze';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const imageOverlay = document.getElementById('imageOverlay');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const emptyState = document.getElementById('emptyState');
    const results = document.getElementById('results');
    const statsGrid = document.getElementById('statsGrid');
    const listingsBody = document.getElementById('listingsBody');

    let selectedFile = null;

    function setStatus(type, msg) {
      statusDot.className = 'dot ' + type;
      statusText.textContent = msg;
    }

    function showPreview(file) {
      const url = URL.createObjectURL(file);
      preview.src = url;
      dropZone.classList.add('has-image');
      imageOverlay.textContent = file.name;
      analyzeBtn.disabled = false;
      setStatus('success', file.name);
    }

    fileInput.addEventListener('change', e => {
      const f = e.target.files[0];
      if (f) { selectedFile = f; showPreview(f); }
      fileInput.value = '';
    });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f) { selectedFile = f; showPreview(f); }
    });

    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      analyzeBtn.disabled = true;
      setStatus('loading', 'Searching marketplace listings…');
      emptyState.style.display = 'none';
      results.classList.remove('visible');

      const form = new FormData();
      form.append('image', selectedFile);

      try {
        const res = await fetch(API, { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Server error');

        renderResults(data);
        setStatus('success', `Found ${data.listing_count} listing${data.listing_count !== 1 ? 's' : ''}`);
      } catch (err) {
        setStatus('error', err.message);
        emptyState.style.display = 'flex';
        emptyState.querySelector('p').textContent = 'Error: ' + err.message;
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    function renderResults(data) {
      const c = data.currency || '$';

      statsGrid.innerHTML = `
    <div class="stat-cell">
      <div class="label">Active listings</div>
      <div class="value accent">${data.listing_count}</div>
    </div>
    <div class="stat-cell">
      <div class="label">Avg list price</div>
      <div class="value">${c}${data.avg_listing_price.toFixed(2)}</div>
    </div>
    <div class="stat-cell">
      <div class="label">Sold listings</div>
      <div class="value">${data.sold_count}</div>
    </div>
    <div class="stat-cell">
      <div class="label">Avg sold price</div>
      <div class="value">${data.avg_sold_price > 0 ? c + data.avg_sold_price.toFixed(2) : '—'}</div>
    </div>
  `;

      const minPrice = Math.min(...data.listings.filter(l => !l.sold_date).map(l => l.price_value).filter(v => v > 0));

      listingsBody.innerHTML = data.listings.map(l => {
        const isCheapest = !l.sold_date && l.price_value === minPrice;
        const simPct = (l.similarity_score / 10) * 100;
        return `
      <tr>
        <td><a class="listing-link" href="${l.url}" target="_blank" rel="noopener">${l.title}</a></td>
        <td class="price-val ${isCheapest ? 'cheapest' : ''}">${l.price_raw}</td>
        <td><span class="source-tag">${l.source}</span></td>
        <td>
          <div class="sim-bar">
            <div class="sim-bar-track"><div class="sim-bar-fill" style="width:${simPct}%"></div></div>
            <span>${l.similarity_score}/10</span>
          </div>
        </td>
        <td>${l.sold_date ? '<span class="sold-tag">Sold</span>' : '—'}</td>
      </tr>
    `;
      }).join('');

      results.classList.add('visible');
    }
  </script>
</body>

</html>
